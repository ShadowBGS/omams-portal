# ============================================================
# Render.com Configuration for OMAMS Web Portal
# ============================================================
# This file configures a static site deployment on Render
# Docs: https://render.com/docs/yaml-spec

services:
  - type: web
    name: omams-portal
    env: static
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    staticPublishPath: .
    
    # Custom headers for security
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: "geolocation=(), microphone=(), camera=()"
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://*.firebaseapp.com https://*.googleapis.com https://your-backend.onrender.com; frame-src https://*.firebaseapp.com;"
    
    # Routes configuration
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    
    # Environment variables
    envVars:
      - key: API_URL
        sync: false  # Set this manually in Render dashboard
      - key: NODE_ENV
        value: production

    # Disk for logs (optional)
    disk:
      name: web-logs
      mountPath: /var/log
      sizeGB: 1

# Note: Set the API_URL environment variable in Render dashboard
# Example: https://your-backend-api.onrender.com
